<div class="login-wrap">
  <div class="card login-card">
    <div class="text-center mb-4">
      <div class="logo-circle mx-auto mb-3">
        <!-- icona o logo studio -->
      </div>
      <h5 class="fw-500">Studio Medico</h5>
      <p class="text-muted small">Accedi al portale riservato agli iscritti</p>
    </div>
    <form [formGroup]="formGroup" (submit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label small">Email</label>
        <input class="form-control" formControlName="email" type="email" placeholder="utente@studiomed.it">
      </div>
      <div class="mb-3">
        <label class="form-label small">Password</label>
        <input class="form-control" formControlName="password" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary w-100">Accedi</button>
    </form>
  </div>
</div>
