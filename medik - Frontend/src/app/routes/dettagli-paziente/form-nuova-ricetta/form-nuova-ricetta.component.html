<div class="modal-header">
  <p class="modal-title">Nuova ricetta</p>
  <button class="modal-close" mat-dialog-close>✕</button>
</div>

<mat-dialog-content [formGroup]="formGroup">
  <div class="field">
    <label>Descrizione</label>
    <input type="text" formControlName="descrizione" class="form-control" placeholder="Descrizione della ricetta...">
  </div>
  <div class="field">
    <label>Urgenza</label>
    <select formControlName="urgenza" class="form-control">
      <option value="">Seleziona...</option>
      <option value="BASSA">Bassa</option>
      <option value="MEDIA">Media</option>
      <option value="ALTA">Alta</option>
    </select>
  </div>
</mat-dialog-content>

<div class="modal-footer">
  <button class="btn-cancel" mat-dialog-close>Annulla</button>
  <button class="btn-submit" (click)="onSubmit()" [disabled]="formGroup.invalid">Aggiungi ricetta</button>
</div>
